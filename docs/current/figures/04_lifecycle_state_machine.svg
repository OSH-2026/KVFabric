" height="86" rx="14" class="gold"/><text x="1357.5" y="183.5" text-anchor="middle" dominant-baseline="middle" class="small">Rebuilt</text><text x="1357.5" y="212.5" text-anchor="middle" dominant-baseline="middle" class="small">同 hash 重建</text><rect x="105" y="325" width="1390" height="275" rx="24" class="gray"/><text x="800" y="370" text-anchor="middle" class="label">Lifecycle Side Table：block_id -> metadata</text><rect x="165" y="425" width="340" height="58" rx="10" class="green"/><text x="335.0" y="441.5" text-anchor="middle" dominant-baseline="middle" class="small">ref_cnt / share_degree</text><text x="335.0" y="466.5" text-anchor="middle" dominant-baseline="middle" class="small">共享状态</text><rect x="595" y="425" width="340" height="58" rx="10" class="green"/><text x="765.0" y="441.5" text-anchor="middle" dominant-baseline="middle" class="small">last_access / hit_count</text><text x="765.0" y="466.5" text-anchor="middle" dominant-baseline="middle" class="small">热度与复用</text><rect x="1025" y="425" width="340" height="58" rx="10" class="green"/><text x="1195.0" y="441.5" text-anchor="middle" dominant-baseline="middle" class="small">prefix_depth</text><text x="1195.0" y="466.5" text-anchor="middle" dominant-baseline="middle" class="small">前缀位置</text><rect x="165" y="520" width="340" height="58" rx="10" class="green"/><text x="335.0" y="536.5" text-anchor="middle" dominant-baseline="middle" class="small">branch_factor</text><text x="335.0" y="561.5" text-anchor="middle" dominant-baseline="middle" class="small">分叉价值</text><rect x="595" y="520" width="340" height="58" rx="10" class="green"/><text x="765.0" y="536.5" text-anchor="middle" dominant-baseline="middle" class="small">recompute_cost</text><text x="765.0" y="561.5" text-anchor="middle" dominant-baseline="middle" class="small">重算代价</text><rect x="1025" y="520" width="340" height="58" rx="10" class="green"/><text x="1195.0" y="536.5" text-anchor="middle" dominant-baseline="middle" class="small">eviction_regret</text><text x="1195.0" y="561.5" text-anchor="middle" dominant-baseline="middle" class="small">错误淘汰反馈</text><rect x="205" y="680" width="1190" height="105" rx="18" class="gold"/><text x="800.0" y="717.5" text-anchor="middle" dominant-baseline="middle" class="small">事件来源：cache_full_blocks / touch / free_blocks / get_new_blocks / maybe_evict_cached_block</text><text x="800.0" y="747.5" text-anchor="middle" dominant-baseline="middle" class="small">第一阶段记录事件与指标；第二阶段将元数据用于驱逐候选评分</text></svg>