<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect width="1600" height="900" fill="#fff"/>
<style>
  .title{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:38px;font-weight:700;fill:#083258}
  .label{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:24px;font-weight:700;fill:#083258}
  .small{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:20px;font-weight:600;fill:#18283c}
  .tiny{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:17px;font-weight:600;fill:#18283c}
  .blue{fill:#e8f1f9;stroke:#5b9bd5;stroke-width:2.4}
  .red{fill:#fcecee;stroke:#c95b68;stroke-width:2.4}
  .gold{fill:#fff4cf;stroke:#d7a619;stroke-width:2.4}
  .green{fill:#e8f4df;stroke:#84b96b;stroke-width:2.4}
  .gray{fill:#f5f8fc;stroke:#cdd8e5;stroke-width:2.4}
  .line{stroke:#2a6096;stroke-width:4;fill:none;marker-end:url(#arrow)}
  .dash{stroke:#91a4bb;stroke-width:2.5;fill:none;stroke-dasharray:9 7}
</style>
<defs><marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto"><path d="M2,2 L12,7 L2,12 Z" fill="#2a6096"/></marker></defs>
<text x="55" y="70" text-anchor="start" class="title">Prefix Caching 与共享后分叉</text><rect x="170" y="170" width="125" height="78" rx="16" class="blue"/><text x="232.5" y="209.0" text-anchor="middle" dominant-baseline="middle" class="label">B0</text><path d="M295,209 L350,209" class="line"/><rect x="360" y="170" width="125" height="78" rx="16" class="blue"/><text x="422.5" y="209.0" text-anchor="middle" dominant-baseline="middle" class="label">B1</text><path d="M485,209 L540,209" class="line"/><rect x="550" y="170" width="125" height="78" rx="16" class="blue"/><text x="612.5" y="209.0" text-anchor="middle" dominant-baseline="middle" class="label">B2</text><path d="M675,209 L730,209" class="line"/><rect x="740" y="170" width="125" height="78" rx="16" class="blue"/><text x="802.5" y="209.0" text-anchor="middle" dominant-baseline="middle" class="label">B3</text><text x="450" y="135" text-anchor="middle" class="label">共享 full-block 前缀，可命中并复用</text><path d="M870,209 L1040,150" class="line"/><path d="M870,209 L1040,280" class="line"/><rect x="1040" y="110" width="180" height="90" rx="16" class="red"/><text x="1130.0" y="140.5" text-anchor="middle" dominant-baseline="middle" class="small">Req A</text><text x="1130.0" y="169.5" text-anchor="middle" dominant-baseline="middle" class="small">差异后缀</text><rect x="1040" y="240" width="180" height="90" rx="16" class="gold"/><text x="1130.0" y="270.5" text-anchor="middle" dominant-baseline="middle" class="small">Req B</text><text x="1130.0" y="299.5" text-anchor="middle" dominant-baseline="middle" class="small">差异后缀</text><path d="M1220,285 L1355,285" class="line"/><rect x="1355" y="240" width="170" height="90" rx="16" class="gold"/><text x="1440.0" y="270.5" text-anchor="middle" dominant-baseline="middle" class="small">Req C</text><text x="1440.0" y="299.5" text-anchor="middle" dominant-baseline="middle" class="small">继续分叉</text><path d="M120,365 L1480,365" class="dash"/><rect x="110" y="430" width="400" height="170" rx="18" class="gray"/><text x="310.0" y="471.5" text-anchor="middle" dominant-baseline="middle" class="small">vLLM 当前机制</text><text x="310.0" y="500.5" text-anchor="middle" dominant-baseline="middle" class="small">从第一个 block 连续扫描</text><text x="310.0" y="529.5" text-anchor="middle" dominant-baseline="middle" class="small">遇到 miss 即停止</text><text x="310.0" y="558.5" text-anchor="middle" dominant-baseline="middle" class="small">只缓存 full block</text><rect x="600" y="430" width="400" height="170" rx="18" class="gold"/><text x="800.0" y="471.5" text-anchor="middle" dominant-baseline="middle" class="small">KVFabric L1 目标</text><text x="800.0" y="500.5" text-anchor="middle" dominant-baseline="middle" class="small">记录 parent -> child</text><text x="800.0" y="529.5" text-anchor="middle" dominant-baseline="middle" class="small">识别分叉中心</text><text x="800.0" y="558.5" text-anchor="middle" dominant-baseline="middle" class="small">用于驱逐价值评估</text><rect x="1090" y="430" width="400" height="170" rx="18" class="green"/><text x="1290.0" y="471.5" text-anchor="middle" dominant-baseline="middle" class="small">暂不处理</text><text x="1290.0" y="500.5" text-anchor="middle" dominant-baseline="middle" class="small">任意片段匹配</text><text x="1290.0" y="529.5" text-anchor="middle" dominant-baseline="middle" class="small">物理 block 去重</text><text x="1290.0" y="558.5" text-anchor="middle" dominant-baseline="middle" class="small">未满尾块共享</text><rect x="210" y="685" width="1180" height="105" rx="18" class="blue"/><text x="800.0" y="722.5" text-anchor="middle" dominant-baseline="middle" class="small">核心思路：先利用 vLLM 已支持的公共前缀复用，再补充分叉结构元数据</text><text x="800.0" y="752.5" text-anchor="middle" dominant-baseline="middle" class="small">让高价值共享前缀在显存压力下更不容易被误驱逐</text></svg>