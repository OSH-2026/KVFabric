<defs><marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto"><path d="M2,2 L12,7 L2,12 Z" fill="#2a6096"/></marker></defs>
<text x="55" y="70" text-anchor="start" class="title">vLLM KVCache 调用链与 KVFabric 接入点</text><rect x="55" y="155" width="165" height="105" rx="12" class="blue"/><text x="137.5" y="179.5" text-anchor="middle" dominant-baseline="middle" class="small">Request</text><text x="137.5" y="207.5" text-anchor="middle" dominant-baseline="middle" class="small">tokens</text><text x="137.5" y="235.5" text-anchor="middle" dominant-baseline="middle" class="small">block_hashes</text><path d="M220,207 L238,207" class="line"/><rect x="250" y="155" width="170" height="105" rx="12" class="blue"/><text x="335.0" y="179.5" text-anchor="middle" dominant-baseline="middle" class="small">Scheduler</text><text x="335.0" y="207.5" text-anchor="middle" dominant-baseline="middle" class="small">schedule</text><text x="335.0" y="235.5" text-anchor="middle" dominant-baseline="middle" class="small">computed</text><path d="M420,207 L438,197" class="line"/><rect x="450" y="145" width="220" height="105" rx="12" class="red"/><text x="560.0" y="169.5" text-anchor="middle" dominant-baseline="middle" class="small">KVCacheManager</text><text x="560.0" y="197.5" text-anchor="middle" dominant-baseline="middle" class="small">computed blocks</text><text x="560.0" y="225.5" text-anchor="middle" dominant-baseline="middle" class="small">allocate slots</text><path d="M670,197 L688,197" class="line"/><rect x="700" y="145" width="210" height="105" rx="12" class="red"/><text x="805.0" y="169.5" text-anchor="middle" dominant-baseline="middle" class="small">SingleType Manager</text><text x="805.0" y="197.5" text-anchor="middle" dominant-baseline="middle" class="small">longest hit</text><text x="805.0" y="225.5" text-anchor="middle" dominant-baseline="middle" class="small">cache / free</text><path d="M910,197 L928,207" class="line"/><rect x="940" y="155" width="170" height="105" rx="12" class="red"/><text x="1025.0" y="179.5" text-anchor="middle" dominant-baseline="middle" class="small">BlockPool</text><text x="1025.0" y="207.5" text-anchor="middle" dominant-baseline="middle" class="small">free queue</text><text x="1025.0" y="235.5" text-anchor="middle" dominant-baseline="middle" class="small">evict</text><path d="M1110,207 L1128,207" class="line"/><rect x="1140" y="155" width="185" height="105" rx="12" class="gray"/><text x="1232.5" y="179.5" text-anchor="middle" dominant-baseline="middle" class="small">SchedulerOutput</text><text x="1232.5" y="207.5" text-anchor="middle" dominant-baseline="middle" class="small">block ids</text><text x="1232.5" y="235.5" text-anchor="middle" dominant-baseline="middle" class="small">computed</text><path d="M1325,207 L1343,207" class="line"/><rect x="1355" y="155" width="185" height="105" rx="12" class="gray"/><text x="1447.5" y="179.5" text-anchor="middle" dominant-baseline="middle" class="small">Worker</text><text x="1447.5" y="207.5" text-anchor="middle" dominant-baseline="middle" class="small">slot mapping</text><text x="1447.5" y="235.5" text-anchor="middle" dominant-baseline="middle" class="small">attention KV</text><rect x="470" y="295" width="180" height="82" class="dash"/><text x="560.0" y="342" text-anchor="middle" class="tiny">观测 hit / token</text><rect x="720" y="295" width="170" height="82" class="dash"/><text x="805.0" y="342" text-anchor="middle" class="tiny">定位命中边界</text><rect x="955" y="295" width="140" height="82" class="dash"/><text x="1025.0" y="342" text-anchor="middle" class="tiny">驱逐评分入口</text><rect x="120" y="470" width="620" height="125" rx="18" class="gold"/><text x="430.0" y="517.5" text-anchor="middle" dominant-baseline="middle" class="label">KVFabric 控制面改造</text><text x="430.0" y="547.5" text-anchor="middle" dominant-baseline="middle" class="label">不改变 block_id 下发后的 worker 语义</text><rect x="860" y="470" width="620" height="125" rx="18" class="green"/><text x="1170.0" y="517.5" text-anchor="middle" dominant-baseline="middle" class="label">正确性边界</text><text x="1170.0" y="547.5" text-anchor="middle" dominant-baseline="middle" class="label">不物理去重 / 不缓存未满尾块 / 不动 kernel</text><rect x="225" y="675" width="1150" height="100" rx="18" class="gray"/><text x="800.0" y="711.0" text-anchor="middle" dominant-baseline="middle" class="small">接入点集中在 KVCacheManager、BlockPool 与 Metrics</text><text x="800.0" y="739.0" text-anchor="middle" dominant-baseline="middle" class="small">记录生命周期事件，并在候选驱逐时计算保留价值</text></svg>