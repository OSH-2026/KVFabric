<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect width="1600" height="900" fill="#fff"/>
<style>
  .title{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:34px;font-weight:700;fill:#083258}
  .label{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:19px;font-weight:700;fill:#083258}
  .small{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:15px;fill:#18283c}
  .tiny{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:13px;fill:#18283c}
  .blue{fill:#e8f1f9;stroke:#5b9bd5;stroke-width:2}
  .red{fill:#fcecee;stroke:#c95b68;stroke-width:2}
  .gold{fill:#fff4cf;stroke:#d7a619;stroke-width:2}
  .green{fill:#e8f4df;stroke:#84b96b;stroke-width:2}
  .gray{fill:#f5f8fc;stroke:#cdd8e5;stroke-width:2}
  .line{stroke:#2a6096;stroke-width:3;fill:none;marker-end:url(#arrow)}
  .dash{stroke:#91a4bb;stroke-width:2;fill:none;stroke-dasharray:8 7}
</style>
<defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#2a6096"/></marker></defs>
<text x="70" y="75" text-anchor="start" class="title">KVFabric 原型架构：从 vLLM 控制面到生命周期策略</text><rect x="90" y="145" width="1420" height="80" rx="18" class="gray"/><text x="800.0" y="185.0" text-anchor="middle" dominant-baseline="middle" class="label">典型负载：共享 System Prompt / RAG 公共文档 / 多轮对话历史 / 模板化批处理</text><path d="M800,225 L800,275" class="line"/><rect x="140" y="275" width="1320" height="105" rx="16" class="blue"/><text x="800.0" y="314.5" text-anchor="middle" dominant-baseline="middle" class="label">Frontend / Engine Adapter</text><text x="800.0" y="341.5" text-anchor="middle" dominant-baseline="middle" class="label">vLLM OpenAI API + 实验脚本入口</text><path d="M800,380 L800,430" class="line"/><rect x="140" y="430" width="1320" height="210" rx="20" class="gold"/><text x="800" y="470" text-anchor="middle" class="label">KVFabric Lifecycle Layer</text><rect x="205" y="515" width="245" height="85" rx="14" class="gray"/><text x="327.5" y="544.5" text-anchor="middle" dominant-baseline="middle" class="small">Event Collector</text><text x="327.5" y="571.5" text-anchor="middle" dominant-baseline="middle" class="small">命中/分配/释放/驱逐</text><rect x="525" y="515" width="245" height="85" rx="14" class="gray"/><text x="647.5" y="544.5" text-anchor="middle" dominant-baseline="middle" class="small">Lifecycle Side Table</text><text x="647.5" y="571.5" text-anchor="middle" dominant-baseline="middle" class="small">热度/共享/前缀/代价</text><rect x="845" y="515" width="245" height="85" rx="14" class="gray"/><text x="967.5" y="544.5" text-anchor="middle" dominant-baseline="middle" class="small">Policy Engine</text><text x="967.5" y="571.5" text-anchor="middle" dominant-baseline="middle" class="small">KeepScore + 候选选择</text><rect x="1165" y="515" width="245" height="85" rx="14" class="gray"/><text x="1287.5" y="544.5" text-anchor="middle" dominant-baseline="middle" class="small">Metrics Exporter</text><text x="1287.5" y="571.5" text-anchor="middle" dominant-baseline="middle" class="small">hit / regret / latency</text><path d="M800,640 L800,690" class="line"/><rect x="140" y="690" width="1320" height="95" rx="18" class="red"/><text x="800.0" y="724.5" text-anchor="middle" dominant-baseline="middle" class="label">vLLM Core：Scheduler / KVCacheManager / BlockPool / Metrics</text><text x="800.0" y="751.5" text-anchor="middle" dominant-baseline="middle" class="label">保持 worker block table 与 attention kernel 语义不变</text></svg>