<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect width="1600" height="900" fill="#fff"/>
<style>
  .title{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:38px;font-weight:700;fill:#083258}
  .label{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:24px;font-weight:700;fill:#083258}
  .small{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:20px;font-weight:600;fill:#18283c}
  .tiny{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:17px;font-weight:600;fill:#18283c}
  .blue{fill:#e8f1f9;stroke:#5b9bd5;stroke-width:2.4}
  .red{fill:#fcecee;stroke:#c95b68;stroke-width:2.4}
  .gold{fill:#fff4cf;stroke:#d7a619;stroke-width:2.4}
  .green{fill:#e8f4df;stroke:#84b96b;stroke-width:2.4}
  .gray{fill:#f5f8fc;stroke:#cdd8e5;stroke-width:2.4}
  .line{stroke:#2a6096;stroke-width:4;fill:none;marker-end:url(#arrow)}
  .dash{stroke:#91a4bb;stroke-width:2.5;fill:none;stroke-dasharray:9 7}
</style>
<defs><marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto"><path d="M2,2 L12,7 L2,12 Z" fill="#2a6096"/></marker></defs>
<text x="55" y="70" text-anchor="start" class="title">共享感知驱逐：二阶段 KeepScore 策略</text><rect x="95" y="150" width="540" height="135" rx="18" class="gray"/><text x="365.0" y="188.5" text-anchor="middle" dominant-baseline="middle" class="small">vLLM 原路径</text><text x="365.0" y="217.5" text-anchor="middle" dominant-baseline="middle" class="small">free queue 队首 -> popleft_n</text><text x="365.0" y="246.5" text-anchor="middle" dominant-baseline="middle" class="small">近似 LRU + 尾块优先</text><path d="M635,218 L745,218" class="line"/><rect x="745" y="125" width="780" height="185" rx="18" class="gold"/><text x="1135.0" y="159.5" text-anchor="middle" dominant-baseline="middle" class="small">KVFabric 改造</text><text x="1135.0" y="188.5" text-anchor="middle" dominant-baseline="middle" class="small">1. 观察队首 K 个候选</text><text x="1135.0" y="217.5" text-anchor="middle" dominant-baseline="middle" class="small">2. 仅对候选计算保留价值</text><text x="1135.0" y="246.5" text-anchor="middle" dominant-baseline="middle" class="small">3. 选择 KeepScore 最低的 block 作为 victim</text><text x="1135.0" y="275.5" text-anchor="middle" dominant-baseline="middle" class="small">4. 保留配置开关，可回退默认路径</text><text x="800" y="395" text-anchor="middle" class="label">保留价值 = 热度 + 共享度 + 复用历史 + 前缀位置价值 + 重算代价 + 分叉价值</text><rect x="105" y="460" width="170" height="82" rx="14" class="blue"/><text x="190.0" y="486.5" text-anchor="middle" dominant-baseline="middle" class="small">Heat</text><text x="190.0" y="515.5" text-anchor="middle" dominant-baseline="middle" class="small">最近访问</text><path d="M275,501 L335,501" class="line"/><rect x="345" y="460" width="170" height="82" rx="14" class="red"/><text x="430.0" y="486.5" text-anchor="middle" dominant-baseline="middle" class="small">Share</text><text x="430.0" y="515.5" text-anchor="middle" dominant-baseline="middle" class="small">当前共享</text><path d="M515,501 L575,501" class="line"/><rect x="585" y="460" width="170" height="82" rx="14" class="blue"/><text x="670.0" y="486.5" text-anchor="middle" dominant-baseline="middle" class="small">Reuse</text><text x="670.0" y="515.5" text-anchor="middle" dominant-baseline="middle" class="small">历史命中</text><path d="M755,501 L815,501" class="line"/><rect x="825" y="460" width="170" height="82" rx="14" class="red"/><text x="910.0" y="486.5" text-anchor="middle" dominant-baseline="middle" class="small">PrefixPos</text><text x="910.0" y="515.5" text-anchor="middle" dominant-baseline="middle" class="small">前缀靠前</text><path d="M995,501 L1055,501" class="line"/><rect x="1065" y="460" width="170" height="82" rx="14" class="blue"/><text x="1150.0" y="486.5" text-anchor="middle" dominant-baseline="middle" class="small">Cost</text><text x="1150.0" y="515.5" text-anchor="middle" dominant-baseline="middle" class="small">重算昂贵</text><path d="M1235,501 L1295,501" class="line"/><rect x="1305" y="460" width="170" height="82" rx="14" class="red"/><text x="1390.0" y="486.5" text-anchor="middle" dominant-baseline="middle" class="small">Branch</text><text x="1390.0" y="515.5" text-anchor="middle" dominant-baseline="middle" class="small">分叉中心</text><rect x="205" y="665" width="565" height="115" rx="18" class="green"/><text x="487.5" y="692.5" text-anchor="middle" dominant-baseline="middle" class="small">倾向保留</text><text x="487.5" y="722.5" text-anchor="middle" dominant-baseline="middle" class="small">共享度高 / 公共前缀靠前</text><text x="487.5" y="752.5" text-anchor="middle" dominant-baseline="middle" class="small">历史命中多 / 重算代价高</text><rect x="830" y="665" width="565" height="115" rx="18" class="red"/><text x="1112.5" y="692.5" text-anchor="middle" dominant-baseline="middle" class="small">倾向驱逐</text><text x="1112.5" y="722.5" text-anchor="middle" dominant-baseline="middle" class="small">长尾独占后缀 / 冷却时间长</text><text x="1112.5" y="752.5" text-anchor="middle" dominant-baseline="middle" class="small">命中少 / 重建代价低</text></svg>